<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Online</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap');

  :root {
    --red: #C0181A;
    --red-dark: #8B0E0F;
    --red-light: #F8E8E8;
    --black: #111111;
    --white: #FFFFFF;
    --cream: #FBF8F5;
    --gray: #6B6B6B;
    --border: #E8E0D8;
    --success: #1A7A3C;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--black);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--black);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-area img {
    height: 44px;
    width: 44px;
    object-fit: contain;
    border-radius: 6px;
    background: white;
    padding: 2px;
  }
  .logo-text {
    font-family: 'Playfair Display', serif;
    color: var(--white);
    font-size: 20px;
    font-weight: 700;
    line-height: 1.1;
  }
  .logo-sub {
    color: var(--red);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .cart-btn {
    background: var(--red);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s;
    position: relative;
  }
  .cart-btn:hover { background: var(--red-dark); }
  .cart-count {
    background: white;
    color: var(--red);
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* TABLE BANNER */
  .table-banner {
    background: var(--red);
    color: white;
    text-align: center;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    display: none;
  }
  .table-banner.visible { display: block; }

  /* MAIN */
  .main { max-width: 900px; margin: 0 auto; padding: 24px 16px 120px; }

  /* TABLE INPUT */
  .table-input-section {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .table-input-section h3 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--black);
  }
  .input-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .input-row input {
    flex: 1;
    min-width: 140px;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row input:focus { border-color: var(--red); }

  /* CATEGORIES */
  .categories {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 20px;
    scrollbar-width: none;
  }
  .categories::-webkit-scrollbar { display: none; }
  .cat-btn {
    background: white;
    border: 1.5px solid var(--border);
    color: var(--gray);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .cat-btn:hover { border-color: var(--red); color: var(--red); }
  .cat-btn.active {
    background: var(--red);
    border-color: var(--red);
    color: white;
  }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray);
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* PRODUCTS GRID */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--black);
    padding-bottom: 8px;
    border-bottom: 2px solid var(--red);
    display: inline-block;
  }
  .section-wrap { margin-bottom: 32px; }
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }
  .product-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .product-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  }
  .product-img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    background: var(--red-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
  }
  .product-img img {
    width: 100%;
    height: 140px;
    object-fit: cover;
  }
  .product-info {
    padding: 12px;
  }
  .product-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--black);
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .product-price {
    font-size: 15px;
    font-weight: 700;
    color: var(--red);
  }
  .product-footer {
    padding: 0 12px 12px;
  }
  .add-btn {
    width: 100%;
    background: var(--red);
    color: white;
    border: none;
    padding: 8px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .add-btn:hover { background: var(--red-dark); }
  .add-btn.in-cart {
    background: var(--success);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
  }
  .qty-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qty-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* CART SIDEBAR */
  .cart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .cart-overlay.open { display: block; opacity: 1; }
  .cart-panel {
    position: fixed;
    right: -100%;
    top: 0;
    bottom: 0;
    width: 360px;
    max-width: 95vw;
    background: white;
    z-index: 201;
    display: flex;
    flex-direction: column;
    transition: right 0.3s;
    box-shadow: -4px 0 30px rgba(0,0,0,0.15);
  }
  .cart-panel.open { right: 0; }
  .cart-header {
    background: var(--black);
    color: white;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cart-header h2 { font-size: 18px; font-weight: 700; }
  .close-cart {
    background: none;
    border: none;
    color: white;
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
  }
  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  .cart-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--gray);
  }
  .cart-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .cart-item-price { font-size: 13px; color: var(--red); font-weight: 600; }
  .cart-item-qty {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cqty-btn {
    background: var(--red-light);
    border: none;
    color: var(--red);
    width: 26px;
    height: 26px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cqty-num { font-size: 14px; font-weight: 600; min-width: 20px; text-align: center; }
  .cart-footer {
    padding: 20px;
    border-top: 2px solid var(--border);
    background: var(--cream);
  }
  .cart-notes {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    resize: none;
    outline: none;
    margin-bottom: 14px;
  }
  .cart-notes:focus { border-color: var(--red); }
  .cart-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .cart-total-label { font-size: 15px; font-weight: 600; }
  .cart-total-amount { font-size: 20px; font-weight: 700; color: var(--red); }
  .place-order-btn {
    width: 100%;
    background: var(--red);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .place-order-btn:hover { background: var(--red-dark); }
  .place-order-btn:disabled { background: var(--gray); cursor: not-allowed; }

  /* SUCCESS MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 16px;
    padding: 32px 28px;
    max-width: 360px;
    width: 90%;
    text-align: center;
  }
  .modal-icon { font-size: 52px; margin-bottom: 16px; }
  .modal h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .modal p { color: var(--gray); font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
  .modal-order-id { font-size: 13px; color: var(--gray); margin-bottom: 20px; }
  .modal-order-id span { font-weight: 700; color: var(--black); }
  .modal-btn {
    background: var(--red);
    color: white;
    border: none;
    padding: 12px 32px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }

  /* BOTTOM NAV CART */
  .bottom-cart {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--red);
    color: white;
    padding: 14px 20px;
    display: none;
    align-items: center;
    justify-content: space-between;
    z-index: 99;
    cursor: pointer;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
  }
  .bottom-cart.visible { display: flex; }
  .bottom-cart-info { font-size: 14px; font-weight: 600; }
  .bottom-cart-total { font-size: 16px; font-weight: 700; }

  /* ERROR */
  .error-msg {
    background: #FEE2E2;
    color: #991B1B;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 13px;
    display: none;
  }
  .error-msg.visible { display: block; }

  @media (max-width: 480px) {
    .products-grid { grid-template-columns: repeat(2, 1fr); }
    .cart-panel { width: 100%; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="logo-area">
   <!--   <img src="https://buttkarahi.itsolhub.com/web/image/res.company/1/logo" alt="Butt Karahi" onerror="this.style.display='none'"> -->
      <div>
        <div class="logo-text">Demo Kitchen</div>
      </div>
    </div>
    <button class="cart-btn" onclick="toggleCart()">
      🛒 Cart <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<!-- TABLE BANNER -->
<div class="table-banner" id="tableBanner"></div>

<!-- MAIN -->
<div class="main">

  <!-- TABLE INPUT -->
  <div class="table-input-section" id="tableSection">
    <h3>Your Details</h3>
    <div class="input-row">
      <input type="text" id="tableInput" placeholder="Table Number" />
      <input type="text" id="nameInput" placeholder="Your Name (optional)" />
      <input type="tel" id="phoneInput" placeholder="Phone (for confirmation)" />
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <!-- CATEGORIES -->
  <div class="categories" id="categoriesBar"></div>

  <!-- LOADING -->
  <div class="loading" id="loadingEl">
    <div class="spinner"></div>
    <p>Loading menu...</p>
  </div>

  <!-- MENU SECTIONS -->
  <div id="menuSections"></div>

</div>

<!-- BOTTOM CART BAR -->
<div class="bottom-cart" id="bottomCart" onclick="toggleCart()">
  <div class="bottom-cart-info" id="bottomCartInfo"></div>
  <div class="bottom-cart-total" id="bottomCartTotal"></div>
</div>

<!-- CART PANEL -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h2>Your Order</h2>
    <button class="close-cart" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty">Your cart is empty</div>
  </div>
  <div class="cart-footer">
    <textarea class="cart-notes" id="cartNotes" rows="2" placeholder="Special instructions (optional)..."></textarea>
    <div class="cart-total">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-amount" id="cartTotalAmount">PKR 0</span>
    </div>
    <button class="place-order-btn" id="placeOrderBtn" onclick="placeOrder()">Place Order</button>
  </div>
</div>

<!-- SUCCESS MODAL -->
<div class="modal-overlay" id="successModal">
  <div class="modal">
    <div class="modal-icon">✅</div>
    <h2>Order Placed!</h2>
    <p>Your order has been received. Our staff will bring it to your table shortly.</p>
    <div class="modal-order-id">Order ID: <span id="modalOrderId"></span></div>
    <button class="modal-btn" onclick="closeModal()">Done</button>
  </div>
</div>

<script>
// CONFIG — Update these for your setup
// const ODOO_URL = 'https://buttkarahi.itsolhub.com';
// const DB = 'posdb';
const N8N_WEBHOOK = 'https://n8n.octate.ooo/webhook/buttkarahi-order'; // Update with your n8n webhook URL

let cart = {};
let products = {};
let categories = [];
let activeCategory = 'all';
let tableNumber = '';

// Get table from URL params (QR code)
const urlParams = new URLSearchParams(window.location.search);
const tableFromQR = urlParams.get('table');
if (tableFromQR) {
  document.getElementById('tableInput').value = tableFromQR;
  const banner = document.getElementById('tableBanner');
  banner.textContent = `Table ${tableFromQR}`;
  banner.classList.add('visible');
}

async function loadMenu() {
  try {
    const res = await fetch('https://n8n.octate.ooo/webhook/buttkarahi-menu');
    const data = await res.json();
    
    categories = data.categories || [];
    
    // Index products by category
    const allProducts = data.products || [];
    allProducts.forEach(p => {
      p.pos_categ_ids.forEach(catId => {
        if (!products[catId]) products[catId] = [];
        products[catId].push(p);
      });
    });

    document.getElementById('loadingEl').style.display = 'none';
    renderCategories();
    renderMenu();

  } catch (e) {
    document.getElementById('loadingEl').innerHTML = '<p style="color:#991B1B">Failed to load menu. Please refresh.</p>';
    console.error(e);
  }
}

function renderCategories() {
  const bar = document.getElementById('categoriesBar');
  bar.innerHTML = `<button class="cat-btn active" onclick="filterCategory('all', this)">All</button>`;
  categories.forEach(cat => {
    const count = (products[cat.id] || []).length;
    if (count > 0) {
      bar.innerHTML += `<button class="cat-btn" onclick="filterCategory(${cat.id}, this)">${cat.name}</button>`;
    }
  });
}

function filterCategory(catId, btn) {
  activeCategory = catId;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMenu();
  window.scrollTo({ top: 120, behavior: 'smooth' });
}

function renderMenu() {
  const container = document.getElementById('menuSections');
  container.innerHTML = '';

  if (activeCategory === 'all') {
    categories.forEach(cat => {
      const catProducts = products[cat.id] || [];
      if (catProducts.length === 0) return;
      container.innerHTML += renderSection(cat.name, catProducts);
    });
  } else {
    const cat = categories.find(c => c.id === activeCategory);
    const catProducts = products[activeCategory] || [];
    if (cat && catProducts.length > 0) {
      container.innerHTML += renderSection(cat.name, catProducts);
    }
  }
}

function renderSection(catName, prods) {
  return `
    <div class="section-wrap">
      <div class="section-title">${catName}</div>
      <div class="products-grid">
        ${prods.map(p => renderProduct(p)).join('')}
      </div>
    </div>
  `;
}

function renderProduct(p) {
  const inCart = cart[p.id];

  const imgSrc = p.image_url || null;

  const imgHTML = imgSrc
    ? `<img src="${imgSrc}" alt="${p.name}" onerror="this.parentElement.innerHTML='🍽️'">`
    : `<span>🍽️</span>`;

  const btnHTML = inCart
    ? `<button class="add-btn in-cart" onclick="event.stopPropagation()">
        <span>In Cart</span>
        <div class="qty-controls">
          <button class="qty-btn" onclick="updateQty(${p.id}, -1, event)">−</button>
          <span>${inCart.qty}</span>
          <button class="qty-btn" onclick="updateQty(${p.id}, 1, event)">+</button>
        </div>
       </button>`
    : `<button class="add-btn" onclick="addToCart(${p.id}, '${p.name.replace(/'/g, "\\'")}', ${p.list_price})">Add</button>`;

  return `
    <div class="product-card">
      <div class="product-img">${imgHTML}</div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-price">PKR ${p.list_price.toLocaleString()}</div>
      </div>
      <div class="product-footer">${btnHTML}</div>
    </div>
  `;
}

function addToCart(id, name, price) {
  if (cart[id]) {
    cart[id].qty++;
  } else {
    cart[id] = { id, name, price, qty: 1 };
  }
  updateCartUI();
  renderMenu();
}

function updateQty(id, delta, e) {
  if (e) e.stopPropagation();
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  updateCartUI();
  renderMenu();
}

function updateCartUI() {
  const items = Object.values(cart);
  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  const count = items.reduce((s, i) => s + i.qty, 0);

  document.getElementById('cartCount').textContent = count;

  // Cart panel items
  const cartItemsEl = document.getElementById('cartItems');
  if (items.length === 0) {
    cartItemsEl.innerHTML = '<div class="cart-empty">Your cart is empty</div>';
  } else {
    cartItemsEl.innerHTML = items.map(item => `
      <div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">PKR ${(item.price * item.qty).toLocaleString()}</div>
        </div>
        <div class="cart-item-qty">
          <button class="cqty-btn" onclick="updateQty(${item.id}, -1)">−</button>
          <span class="cqty-num">${item.qty}</span>
          <button class="cqty-btn" onclick="updateQty(${item.id}, 1)">+</button>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('cartTotalAmount').textContent = `PKR ${total.toLocaleString()}`;

  // Bottom cart bar
  const bottomCart = document.getElementById('bottomCart');
  if (count > 0) {
    bottomCart.classList.add('visible');
    document.getElementById('bottomCartInfo').textContent = `${count} item${count > 1 ? 's' : ''} in cart`;
    document.getElementById('bottomCartTotal').textContent = `PKR ${total.toLocaleString()}`;
  } else {
    bottomCart.classList.remove('visible');
  }
}

function toggleCart() {
  const panel = document.getElementById('cartPanel');
  const overlay = document.getElementById('cartOverlay');
  panel.classList.toggle('open');
  overlay.classList.toggle('open');
}

async function placeOrder() {
  const table = document.getElementById('tableInput').value.trim();
  const name = document.getElementById('nameInput').value.trim();
  const phone = document.getElementById('phoneInput').value.trim();
  const notes = document.getElementById('cartNotes').value.trim();
  const items = Object.values(cart);

  // Validation
  const errorEl = document.getElementById('errorMsg');
  if (!table) {
    errorEl.textContent = 'Please enter your table number.';
    errorEl.classList.add('visible');
    return;
  }
  if (items.length === 0) {
    errorEl.textContent = 'Your cart is empty.';
    errorEl.classList.add('visible');
    return;
  }
  errorEl.classList.remove('visible');

  const btn = document.getElementById('placeOrderBtn');
  btn.disabled = true;
  btn.textContent = 'Placing order...';

  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  const orderId = 'BK-' + Date.now().toString().slice(-6);

  const orderData = {
    order_id: orderId,
    table: table,
    customer: name || 'Guest',
    phone: phone,
    items: items.map(i => ({ id: i.id, name: i.name, qty: i.qty, price: i.price })),
    total: total,
    notes: notes,
    source: tableFromQR ? 'qr_code' : 'website',
    timestamp: new Date().toISOString()
  };

  try {
    const res = await fetch(N8N_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(orderData)
    });

    if (res.ok) {
      // Success
      cart = {};
      updateCartUI();
      renderMenu();
      toggleCart();
      document.getElementById('modalOrderId').textContent = orderId;
      document.getElementById('successModal').classList.add('open');
    } else {
      throw new Error('Order failed');
    }
  } catch (e) {
    errorEl.textContent = 'Failed to place order. Please try again or call staff.';
    errorEl.classList.add('visible');
  }

  btn.disabled = false;
  btn.textContent = 'Place Order';
}

function closeModal() {
  document.getElementById('successModal').classList.remove('open');
}

// Load menu on start
loadMenu();
</script>
</body>
</html>
